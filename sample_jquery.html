<!doctype html>
<html>
  <head>
    <title>Car Purchase Form</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body>
    <h2>Buy a Car</h2>

    <form id="carForm">
      <label>Name:</label>
      <input type="text" id="name" /><br /><br />

      <label>Age:</label>
      <input type="number" id="age" /><br /><br />

      <label>Salary:</label>
      <input type="number" id="salary" /><br /><br />

      <label>Car Name:</label>
      <input type="text" id="car" /><br /><br />

      <button type="submit">Submit</button>
    </form>

    <h3 id="result"></h3>

    <script>
      $(document).ready(function () {
        $("#carForm").submit(function (e) {
          e.preventDefault(); // stop page reload

          // get values
          let name = $("#name").val().trim();
          let age = $("#age").val();
          let salary = $("#salary").val();
          let car = $("#car").val().trim();

          // validation
          if (name === "" || car === "") {
            alert("Name and Car Name cannot be empty!");
            return;
          }

          if (age < 18) {
            alert("You must be at least 18 years old!");
            return;
          }

          if (salary <= 0) {
            alert("Salary must be positive!");
            return;
          }

          // display result
          $("#result").html(
            "Name: " +
              name +
              "<br>" +
              "Age: " +
              age +
              "<br>" +
              "Salary: " +
              salary +
              "<br>" +
              "Car: " +
              car,
          );
        });
      });
    </script>
  </body>
</html>
